<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library - Member Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Css/register.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="sidebar">
            <div class="card shadow-lg">
                <div class="card-body p-5 p-lg-6">
                   
                    <div class="text-center mb-5">
                        <div class="logo-section mb-4">
                            <div class="logo-circle">
                                <img src="/NEU.png" alt="NEU Logo" class="neu-logo">
                            </div>
                        </div>
                        <h1 class="h3 fw-bold text-primary mb-2">NEU Library System</h1>
                        <p class="text-muted mb-0">Create Your Member Account</p>
                    </div>

                    <form id="registerForm">
                        <div class="row g-4">
                            <div class="col-lg-6">
                                <h6 class="text-primary mb-4 fw-semibold">
                                    <i class="fas fa-user me-2"></i>Personal Details
                                </h6>
                                <div class="mb-4">
                                    <label class="form-label fw-medium">Full Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control form-control-lg" id="fullName" placeholder="Last Name, First Name" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-medium">ID Number <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control form-control-lg" id="studentID" placeholder="e.g. 2026-12345" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-medium">Role <span class="text-danger">*</span></label>
                                    <select class="form-select form-select-lg" id="userRole" required>
                                        <option value="" disabled selected>Select Role</option>
                                        <option value="Student">Student</option>
                                        <option value="Faculty">Faculty</option>
                                    </select>
                                </div>
                                <div class="mb-4 year-container">
                                    <label class="form-label fw-medium">Year Level</label>
                                    <select class="form-select form-select-lg" id="yearLevel">
                                        <option value="N/A">N/A</option>
                                        <option value="1">1st Year</option>
                                        <option value="2">2nd Year</option>
                                        <option value="3">3rd Year</option>
                                        <option value="4">4th Year</option>
                                    </select>
                                </div>
                            </div>

                            <div class="col-lg-6">
                                <h6 class="text-primary mb-4 fw-semibold">
                                    <i class="fas fa-graduation-cap me-2"></i>Academic Details
                                </h6>
                                <div class="mb-4">
                                    <label class="form-label fw-medium">Department <span class="text-danger">*</span></label>
                                    <select class="form-select form-select-lg" id="dept" required>
                                        <option value="" disabled selected>Select Department...</option>
                                         <optgroup id="gradGroup" label="Graduate & Special">
                                            <option value="School of Graduate Studies">School of Graduate Studies</option>
                                        </optgroup>
                                        <optgroup label="Undergraduate Colleges">
                                            <option value="College of Accountancy">College of Accountancy</option>
                                            <option value="College of Agriculture">College of Agriculture</option>
                                            <option value="College of Arts and Sciences">College of Arts and Sciences</option>
                                            <option value="College of Business Administration">College of Business Administration</option>
                                            <option value="College of Communication">College of Communication</option>
                                            <option value="College of Informatics and Computing Studies">College of Informatics and Computing Studies</option>
                                            <option value="College of Criminology">College of Criminology</option>
                                            <option value="College of Education">College of Education</option>
                                            <option value="College of Engineering and Architecture">College of Engineering and Architecture</option>
                                            <option value="College of Nursing">College of Nursing</option>
                                        </optgroup>
                                        <optgroup id="facultyGroup" label="Faculty Departments" style="display: none;">
                                    <option value="College of Accountancy Faculty">College of Accountancy Faculty</option>
                                    <option value="College of Agriculture Faculty">College of Agriculture Faculty</option>
                                    <option value="College of Arts and Sciences Faculty">College of Arts and Sciences Faculty</option>
                                    <option value="College of Business Administration Faculty">College of Business Administration Faculty</option>
                                    <option value="College of Communication Faculty">College of Communication Faculty</option>
                                    <option value="College of Informatics and Computing Studies Faculty">College of Informatics and Computing Studies Faculty</option>
                                    <option value="College of Criminology Faculty">College of Criminology Faculty</option>
                                    <option value="College of Education Faculty">College of Education Faculty</option>
                                    <option value="College of Engineering and Architecture Faculty">College of Engineering and Architecture Faculty</option>
                                    <option value="College of Medical Technology Faculty">College of Medical Technology Faculty</option>
                                    <option value="College of Midwifery Faculty">College of Midwifery Faculty</option>
                                    <option value="College of Music Faculty">College of Music Faculty</option>
                                    <option value="College of Nursing Faculty">College of Nursing Faculty</option>
                                    <option value="College of Physical Therapy Faculty">College of Physical Therapy Faculty</option>
                                    <option value="College of Respiratory Therapy Faculty">College of Respiratory Therapy Faculty</option>
                                    <option value="School of International Relations Faculty">School of International Relations Faculty</option>

                                    </select>
                                </div>
                                <div class="mb-4 course-container">
                                    <label class="form-label fw-medium">Course / Program</label>
                                    <select class="form-select form-select-lg" id="course" disabled>
                                        <option value="">Select Department First</option>
                                    </select>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-medium">Email Address <span class="text-danger">*</span></label>
                                    <input type="email" class="form-control form-control-lg" id="regEmail" 
                                           placeholder="name@neu.edu.ph" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-medium">Password <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="password" class="form-control form-control-lg" id="regPass" placeholder="••••••••" required minlength="8">
                                        <button class="btn btn-outline-secondary toggle-pass" type="button">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                    <div class="form-text">Minimum 8 characters required</div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-5 pt-4 border-top">
                            <button type="submit" class="btn btn-primary btn-lg w-100 shadow-lg py-3 fw-semibold fs-5">
                                <i class="fas fa-user-plus me-2"></i>Create Account
                            </button>
                        </div>
                        
                        <div class="text-center mt-4 pt-3">
                            <p class="mb-0 text-muted small">
                                Already have an account? 
                                <a href="index.html" class="text-primary fw-semibold text-decoration-none">Sign in here</a>
                            </p>
                            <div class="copyright mt-3">
                                <p class="mb-0 text-muted small">&copy; 2026 New Era University Library</p>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        
        document.addEventListener('DOMContentLoaded', function() {
        
            const roleSelect = document.getElementById('userRole');
            const yearContainer = document.querySelector('.year-container');
            const courseContainer = document.querySelector('.course-container');

            roleSelect.addEventListener('change', function() {
                if (this.value === 'Faculty') {
                    yearContainer.style.display = 'none';
                    courseContainer.style.display = 'none';
                } else {
                    yearContainer.style.display = 'block';
                    courseContainer.style.display = 'block';
                }
            });

          
            document.querySelector('.toggle-pass').addEventListener('click', function() {
                const passInput = document.getElementById('regPass');
                const icon = this.querySelector('i');
                if (passInput.type === 'password') {
                    passInput.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    passInput.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });

      
            document.querySelectorAll('input, select').forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentNode.style.transform = 'translateY(-2px)';
                });
                input.addEventListener('blur', function() {
                    this.parentNode.style.transform = 'translateY(0)';
                });
            });
        });
    </script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
