<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEU Library - Visitor Log</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="./Css/visitor.css">
</head>
<body>

<header class="site-header">
    <div class="container">
        <div class="header-content">
            <div class="logo-section">
                <img src="NEU.png" alt="NEU Logo" class="header-logo">
                <span class="library-name">NEU Library</span>
            </div>
            <div class="header-right">
                <span id="headerDate" class="date-small"></span>
                <button id="logoutBtn" class="btn-logout-header">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </div>
</header>


<div class="main-wrapper">
    <div class="sidebar">
        <div class="card">
            <div class="card-body text-center">
                <h1 class="welcome-title mb-4">Welcome to NEU Library!</h1>
                
                <div class="visitor-info mb-4">
                    <h6 class="section-title mb-3">Visitor Information</h6>
                    <div class="row g-3">
                        <div class="col-lg-6">
                            <div class="info-box">
                                <div class="info-label">Name</div>
                                <div id="displayName" class="info-value">Loading...</div>
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <div class="info-box">
                                <div class="info-label">Student ID</div>
                                <div id="displayID" class="info-value">Loading...</div>
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <div class="info-box">
                                <div class="info-label">Course</div>
                                <div id="displayCourse" class="info-value">Loading...</div>
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <div class="info-box">
                                <div class="info-label">Department</div>
                                <div id="displayDept" class="info-value">Loading...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <form id="visitForm">
                <div class="purpose-section">
                    <h6 class="section-title mb-4">Purpose of Visit</h6>
                    <div class="purpose-grid" id="purposeGrid">
                        <div class="purpose-box" data-purpose="Study">
                            <i class="fas fa-book"></i>
                            <span>Study</span>
                        </div>
                        <div class="purpose-box" data-purpose="Research">
                            <i class="fas fa-search"></i>
                            <span>Research</span>
                        </div>
                        <div class="purpose-box" data-purpose="Borrow Books">
                            <i class="fas fa-book-open"></i>
                            <span>Borrow Books</span>
                        </div>
                        <div class="purpose-box" data-purpose="Return Books">
                            <i class="fas fa-undo"></i>
                            <span>Return Books</span>
                        </div>
                        <div class="purpose-box" data-purpose="Internet Use">
                            <i class="fas fa-wifi"></i>
                            <span>Internet Use</span>
                        </div>
                        <div class="purpose-box" data-purpose="Group Study">
                            <i class="fas fa-users"></i>
                            <span>Group Study</span>
                        </div>
                    </div>
                    <input type="hidden" id="purpose" name="purpose" required>
                </div>

                <div class="submit-section mt-4">
                    <button type="submit" id="submitVisit" class="btn-primary w-100">
                        <i class="fas fa-clock me-2"></i>Record Time In
                    </button>
                    
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module" src="js/visitor.js"></script>
<script>
const dateElement = document.getElementById("headerDate");
const today = new Date();
dateElement.textContent = today.toLocaleDateString('en-US', { 
    month: 'short', day: 'numeric', year: 'numeric'
});


document.querySelectorAll('.purpose-box').forEach(box => {
    box.addEventListener('click', function() {
        document.querySelectorAll('.purpose-box').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('purpose').value = this.dataset.purpose;
    });
});
</script>
</body>
</html>
