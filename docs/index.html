<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./Css/index.css">
</head>
<body>
    <div class="main-wrapper" id="mainWrapper">
        <div class="sidebar">
            <div class="login-container">
                <div class="login-header">
                    <div class="logo-container">
                        <img src="NEU.jpg" alt="NEU Logo" class="neu-logo">
                    </div>
                    <h2 class="logo-text">NEU Library</h2>
                    <p class="subtitle">Library Visitor Log System</p>
                </div>  

                <div class="card-body">
                    <form id="loginForm" class="login-form">
                        <h6 class="form-title">Account Login</h6>
                        
                        <div class="form-group">
                            <label class="form-label">Institutional Email</label>
                            <div class="input-wrapper">
                                <div class="input-field">
                                    <i class="bi bi-envelope input-icon"></i>
                                    <input type="email" 
                                           id="loginEmail" 
                                           class="form-control" 
                                           placeholder="name@neu.edu.ph"
                                           pattern=".*@neu\.edu\.ph$" 
                                           title="Please use your official @neu.edu.ph email address" 
                                           required>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <div class="input-wrapper">
                                <div class="input-field">
                                    <i class="bi bi-lock-fill input-icon"></i>
                                    <input type="password" id="loginPass" class="form-control" placeholder="Password" required>
                                    <button class="toggle-pass" type="button" id="toggleLoginPass">
                                        <i class="bi bi-eye eye-icon"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="login-btn" id="loginBtn">
                            <span class="btn-content">
                                <span id="btnText">Login</span>
                                <div class="btn-loader"></div>
                            </span>
                        </button>

                        
                        <div class="divider">
                            <hr class="divider-line">
                            <span class="divider-text">or
                            </span>
                        </div>

                        
                        <div class="auth-links">
                           <span class="auth-text">No account?</span><a href="register.html" class="auth-link">Register here</a>
                        </div>
                    </form>
                </div>

                <div class="card-footer">
                    <div class="copyright">
                        <p class="copyright-text">
                            <i class="bi bi-shield-check"></i>
                            © 2026 New Era University Library
                        </p>
                        <p class="copyright-subtext">Library Management System</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="image-area">
            <div class="overlay">
                <div class="particles" id="particles"></div>
                <div class="welcome-text">
                    <h1 class="welcome-title">Welcome to</h1>
                    <h2 class="welcome-subtitle">NEU Library</h2>
                    <p class="welcome-desc">Digital Visitor Management System</p>
                </div>
            </div>
        </div>
    </div>

    <script>
    const togglePass = document.getElementById("toggleLoginPass");
    const passwordInput = document.getElementById("loginPass");
    const icon = togglePass.querySelector("i");

    togglePass.addEventListener("click", () => {
        const type = passwordInput.type === "password" ? "text" : "password";
        passwordInput.type = type;
        icon.classList.toggle("bi-eye");
        icon.classList.toggle("bi-eye-slash");
    });
    </script>   
    <script type="module" src="js/login.js"></script>
</body>
</html>
